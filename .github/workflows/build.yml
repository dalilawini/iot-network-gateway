name: Build ESP32 Arduino Project

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/

      - name: Configure Arduino CLI
        run: |
          arduino-cli config init
          arduino-cli core update-index

      - name: Install ESP32 core
        run: |
          arduino-cli core update-index --additional-urls \
          https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core install esp32:esp32 --additional-urls \
          https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install libraries
        run: |
          arduino-cli lib update-index
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install lvgl@9.4.0
          arduino-cli lib install XPT2046_Touchscreen
          arduino-cli lib install TFT_eSPI
      - name: Setup LVGL config
        run: |
          cp ~/Arduino/libraries/lvgl/lv_conf_template.h ./lv_conf.h
      - name: Compile project
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32 --build-property compiler.cpp.extra_flags="-Iwireless -Idisplay -Iui"   -v .
